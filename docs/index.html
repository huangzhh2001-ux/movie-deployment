<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Dashboard</title>
  <script type="module">
    import { ShinyliveApp } from "https://cdn.jsdelivr.net/npm/shinylive@0.3.2/shinylive.js";
    const el = document.getElementById("app");
    const app = new ShinyliveApp(el, {
      appDir: ".",
      packages: ["shiny", "shinydashboard", "tidyverse", "plotly", "DT", "scales", "shinyWidgets"],
      repo: "https://repo.r-wasm.org"
    });
  </script>
</head>
<body style="margin: 0; padding: 0;">
  <div id="app" style="width: 100%; height: 100vh;"></div>
</body>
</html>
